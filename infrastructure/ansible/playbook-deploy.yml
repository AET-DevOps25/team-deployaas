---
- name: Deploy application from GitHub repository
  hosts: all
  become: yes
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    github_repo: "https://github.com/aet-devops25/team-deployaas.git"
    app_directory: "/home/ec2-user/team-deployaas"
    deployment_user: "ec2-user"
    
  tasks:
    - name: Ensure deployment directory exists
      file:
        path: "{{ app_directory }}"
        state: directory
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0755'

    - name: Check if repository already exists
      stat:
        path: "{{ app_directory }}/.git"
      register: git_repo_exists

    - name: Clone GitHub repository
      git:
        repo: "{{ github_repo }}"
        dest: "{{ app_directory }}"
        version: dev
        force: yes
      become_user: "{{ deployment_user }}"
      when: not git_repo_exists.stat.exists

    - name: Pull latest changes if repository exists
      git:
        repo: "{{ github_repo }}"
        dest: "{{ app_directory }}"
        version: dev
        force: yes
      become_user: "{{ deployment_user }}"
      when: git_repo_exists.stat.exists

    - name: Create .env file for deployment
      copy:
        dest: "{{ app_directory }}/.env"
        content: |
          POSTGRES_USER=initexample
          POSTGRES_PASSWORD=initexample
          POSTGRES_DB=initexample
          FRONTEND_ORIGIN=http://{{ ansible_host }}:3000
          JWT_SECRET=I2GHcCfU2UFQJ/S1yiPYCyT5J5lGdg3vdxNwuCHXyGkRN0g6KEiTGZ0PGBgAhO1e79Xzo2fflk7P1b5mNyJUyg==
          WEBUI_API_KEY=sk-de1b5dfd9ef14dc798d1d121a2128512
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0600'

    - name: Stop any running containers
      shell: |
        cd {{ app_directory }}
        sudo docker-compose down || true
      become_user: "{{ deployment_user }}"
      ignore_errors: yes

    - name: Remove all Docker images to force rebuild
      shell: |
        cd {{ app_directory }}
        sudo docker-compose down --rmi all --volumes --remove-orphans || true
      become_user: "{{ deployment_user }}"
      ignore_errors: yes

    - name: Clean up Docker system
      shell: |
        sudo docker system prune -f || true
      become_user: "{{ deployment_user }}"
      ignore_errors: yes

    - name: Reset git repository to latest dev
      shell: |
        cd {{ app_directory }}
        git fetch origin
        git reset --hard origin/dev
        git clean -fd
      become_user: "{{ deployment_user }}"

    - name: Display current .env file content
      shell: cat {{ app_directory }}/.env
      register: env_content
      become_user: "{{ deployment_user }}"

    - name: Show .env file content
      debug:
        msg: "{{ env_content.stdout }}"

    - name: Build and start application with Docker Compose (no cache)
      shell: |
        cd {{ app_directory }}
        sudo docker-compose build --no-cache
        sudo docker-compose up -d
      become_user: "{{ deployment_user }}"
      register: docker_compose_result
      async: 1800  # 30 minutes timeout
      poll: 30     # Check every 30 seconds

    - name: Check quiz service logs for CORS configuration
      shell: |
        cd {{ app_directory }}
        sudo docker-compose logs quiz-service | grep -i "cors\|frontend\|origin" || echo "No CORS-related logs found"
      register: cors_logs
      become_user: "{{ deployment_user }}"
      ignore_errors: yes

    - name: Display CORS logs
      debug:
        msg: "{{ cors_logs.stdout }}"

    - name: Wait for services to be ready
      wait_for:
        port: "{{ item }}"
        host: localhost
        delay: 10
        timeout: 300
      loop:
        - 3000  # Client
        - 8081  # Quiz service
        - 8082  # Flashcard service
        - 8083  # Auth service
        - 5001  # GenAI service
        - 5432  # PostgreSQL
        - 8080  # PgAdmin
        - 9090  # Prometheus
        - 3001  # Grafana
        - 9093  # Alertmanager

    - name: Check running containers
      shell: sudo docker ps
      register: running_containers
      become_user: "{{ deployment_user }}"

    - name: Display running containers
      debug:
        msg: "{{ running_containers.stdout }}"

    - name: Display application URLs
      debug:
        msg: |
          Application is now running!
          - Frontend: http://{{ ansible_host }}:3000
          - Quiz Service: http://{{ ansible_host }}:8081
          - Flashcard Service: http://{{ ansible_host }}:8082
          - Auth Service: http://{{ ansible_host }}:8083
          - GenAI Service: http://{{ ansible_host }}:5001
          - PgAdmin: http://{{ ansible_host }}:8080
          - Prometheus: http://{{ ansible_host }}:9090
          - Grafana: http://{{ ansible_host }}:3001
          - Alertmanager: http://{{ ansible_host }}:9093
