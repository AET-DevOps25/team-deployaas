apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashcard-service
  namespace: devops25-team-deployaas
  labels:
    app: flashcard-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flashcard-service
  template:
    metadata:
      labels:
        app: flashcard-service
    spec:
      automountServiceAccountToken: false
      containers:
      - name: flashcard-service
        image: ghcr.io/aet-devops25/team-deployaas/flashcard-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: study-assistant-config
              key: DATABASE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: study-assistant-secrets
              key: DATABASE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: study-assistant-secrets
              key: DATABASE_PASSWORD
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: study-assistant-config
              key: SPRING_PROFILES_ACTIVE
        - name: FRONTEND_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: study-assistant-config
              key: FRONTEND_ORIGIN
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "2Gi"
        livenessProbe:
          httpGet:
            path: /api/flashcard/test
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/flashcard/test
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: flashcard-service
  namespace: devops25-team-deployaas
  labels:
    app: flashcard-service
spec:
  selector:
    app: flashcard-service
  ports:
  - port: 8082
    targetPort: 8082
  type: ClusterIP
