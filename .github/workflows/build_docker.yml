name: Build Docker Images

on:
  push:

jobs:
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    
    environment:
      name: AWS

    strategy:
      matrix:
        service: [client, auth-service, quiz-service, flashcard-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_AUTH_HOST=auth.${{ vars.EC2_PUBLIC_IP }}.nip.io
            REACT_APP_QUIZ_HOST=quiz.${{ vars.EC2_PUBLIC_IP }}.nip.io
            REACT_APP_FLASHCARD_HOST=flashcard.${{ vars.EC2_PUBLIC_IP }}.nip.io
            FRONTEND_ORIGIN=https://client.${{ vars.EC2_PUBLIC_IP }}.nip.io
      
      - name: Debug IP injection
        if: matrix.service == 'client'
        run: |
          echo "Auth Host: auth.${{ vars.EC2_PUBLIC_IP }}.nip.io"
          echo "Quiz Host: quiz.${{ vars.EC2_PUBLIC_IP }}.nip.io"
          echo "Flashcard Host: flashcard.${{ vars.EC2_PUBLIC_IP }}.nip.io"
          echo "FRONTEND_ORIGIN=https://client.${{ vars.EC2_PUBLIC_IP }}.nip.io"
