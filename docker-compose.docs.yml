# Docker Compose override for enhanced API documentation
# Use: docker-compose -f docker-compose.yml -f docker-compose.docs.yml up

version: "3.8"

services:
  # API Documentation Gateway
  api-docs:
    image: nginx:alpine
    container_name: api-documentation
    ports:
      - "8080:80"
    volumes:
      - ./api-documentation.html:/usr/share/nginx/html/index.html:ro
      - ./nginx-docs.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - flashcard-service
      - quiz-service
      - genai-service
    networks:
      - study-assistant-network

  # Enhanced Auth Service for documentation
  auth-service:
    environment:
      # Enhanced OpenAPI documentation settings
      - SPRINGDOC_SWAGGER_UI_ENABLED=true
      - SPRINGDOC_API_DOCS_ENABLED=true
      - SPRINGDOC_SWAGGER_UI_PATH=/swagger-ui.html
      - SPRINGDOC_API_DOCS_PATH=/api-docs
      - SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER=method
      - SPRINGDOC_SWAGGER_UI_TAGS_SORTER=alpha
      - SPRINGDOC_SHOW_ACTUATOR=true

  # Enhanced Flashcard Service for documentation
  flashcard-service:
    environment:
      - SPRINGDOC_SWAGGER_UI_ENABLED=true
      - SPRINGDOC_API_DOCS_ENABLED=true
      - SPRINGDOC_SWAGGER_UI_PATH=/swagger-ui.html
      - SPRINGDOC_API_DOCS_PATH=/api-docs
      - SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER=method
      - SPRINGDOC_SWAGGER_UI_TAGS_SORTER=alpha
      - SPRINGDOC_SHOW_ACTUATOR=true

  # Enhanced Quiz Service for documentation
  quiz-service:
    environment:
      - SPRINGDOC_SWAGGER_UI_ENABLED=true
      - SPRINGDOC_API_DOCS_ENABLED=true
      - SPRINGDOC_SWAGGER_UI_PATH=/swagger-ui.html
      - SPRINGDOC_API_DOCS_PATH=/api-docs
      - SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER=method
      - SPRINGDOC_SWAGGER_UI_TAGS_SORTER=alpha
      - SPRINGDOC_SHOW_ACTUATOR=true

  # Enhanced GenAI Service for documentation
  genai-service:
    environment:
      # FastAPI documentation settings
      - DOCS_URL=/docs
      - REDOC_URL=/redoc
      - OPENAPI_URL=/openapi.json

networks:
  study-assistant-network:
    external: true
