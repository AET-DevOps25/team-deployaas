global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'quiz-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['quiz-service:8081']

  - job_name: 'flashcard-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flashcard-service:8082']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8083']

  - job_name: 'genai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['genai-service:5001']
