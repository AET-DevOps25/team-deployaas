services:
  reverse-proxy:
    image: traefik:v3.4
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@you.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    restart: unless-stopped
    networks:
      - traefik

  db:
    image: postgres:14
    container_name: studyapp_db
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - traefik

  pgadmin:
    image: dpage/pgadmin4:6.21
    container_name: studyapp_pgadmin
    env_file:
      - .env.prod
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./database/pgadmin4/servers.json:/pgadmin4/servers.json:ro
    restart: always
    networks:
      - traefik

  auth-service:
    image: ghcr.io/aet-devops25/team-deployaas/auth-service:latest
    container_name: studyapp_auth_service
    env_file:
      - .env.prod
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.auth.rule=Host(`${AUTH_HOST}`)"
      - "traefik.http.services.auth.loadbalancer.server.port=8083"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"
    restart: always
    networks:
      - traefik

  quiz-service:
    image: ghcr.io/aet-devops25/team-deployaas/quiz-service:latest
    container_name: studyapp_quiz_service
    env_file:
      - .env.prod
    depends_on:
      - db
      - genai-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GENAI_SERVICE_URL=http://genai-service:5001

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.quiz.rule=Host(`${QUIZ_HOST}`)"
      - "traefik.http.services.quiz.loadbalancer.server.port=8081"
      - "traefik.http.routers.quiz.entrypoints=websecure"
      - "traefik.http.routers.quiz.tls.certresolver=letsencrypt"
    restart: always
    networks:
      - traefik

  flashcard-service:
    image: ghcr.io/aet-devops25/team-deployaas/flashcard-service:latest
    container_name: studyapp_flashcard_service
    env_file:
      - .env.prod
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.flashcard.rule=Host(`${FLASHCARD_HOST}`)"
      - "traefik.http.services.flashcard.loadbalancer.server.port=8082"
      - "traefik.http.routers.flashcard.entrypoints=websecure"
      - "traefik.http.routers.flashcard.tls.certresolver=letsencrypt"
    restart: always
    networks:
      - traefik

  genai-service:
    image: ghcr.io/aet-devops25/team-deployaas/genai-service:latest
    container_name: studyapp_genai_service
    env_file:
      - .env.prod
    environment:
      - WEBUI_API_KEY=${WEBUI_API_KEY}
      - PORT=5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    restart: always
    networks:
      - traefik

  client:
    image: ghcr.io/aet-devops25/team-deployaas/client:latest
    container_name: studyapp_client
    env_file:
      - .env.prod
    depends_on:
      - auth-service
      - quiz-service
      - flashcard-service
      - genai-service
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.client.rule=Host(`${CLIENT_HOST}`)"
      - "traefik.http.services.client.loadbalancer.server.port=3000"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.client-compress.compress=true"
      - "traefik.http.routers.client.middlewares=client-compress"
    restart: always
    networks:
      - traefik
  
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    ports:
      - "3001:3000"  
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning


volumes:
  pgdata:

networks:
  traefik:
    driver: bridge
