version: '3.8'

services:
  db:
    image: postgres:14
    container_name: studyapp_db
    restart: always
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d

  quiz-service:
    build: ./quiz-service
    container_name: studyapp_quiz_service
    restart: always
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  flashcard-service:
    build: ./flashcard-service
    container_name: studyapp_flashcard_service
    restart: always
    depends_on:
      - db
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  auth-service:
    build: ./auth-service
    container_name: studyapp_auth_service
    restart: always
    depends_on:
      - db
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  client:
    build: ./client
    container_name: studyapp_client
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - quiz-service
      - flashcard-service

volumes:
  pgdata:
