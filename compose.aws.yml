services:
  reverse-proxy:
    image: traefik:v3.4
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@you.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    restart: unless-stopped
    networks:
      - traefik

  db:
    image: postgres:14
    container_name: studyapp_db
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - traefik

  pgadmin:
    image: dpage/pgadmin4:6.21
    container_name: studyapp_pgadmin
    env_file:
      - .env.prod
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./database/pgadmin4/servers.json:/pgadmin4/servers.json:ro
    restart: always
    networks:
      - traefik

  quiz-service:
    image: ghcr.io/yuyangc-gh/team-deployaas/quiz-service:latest
    container_name: studyapp_quiz_service
    env_file:
      - .env.prod
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quiz.rule=Host($${QUIZ_HOST})"
      - "traefik.http.services.quiz.loadbalancer.server.port=8081"
      - "traefik.http.routers.quiz.entrypoints=websecure"
      - "traefik.http.routers.quiz.tls.certresolver=letsencrypt"
    restart: always
    networks:
      - traefik

  flashcard-service:
    image: ghcr.io/yuyangc-gh/team-deployaas/flashcard-service:latest
    container_name: studyapp_flashcard_service
    env_file:
      - .env.prod
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flashcard.rule=Host($${FLASHCARD_HOST})"
      - "traefik.http.services.flashcard.loadbalancer.server.port=8082"
      - "traefik.http.routers.flashcard.entrypoints=websecure"
      - "traefik.http.routers.flashcard.tls.certresolver=letsencrypt"
    restart: always
    networks:
      - traefik

  auth-service:
    image: ghcr.io/yuyangc-gh/team-deployaas/auth-service:latest
    container_name: studyapp_auth_service
    env_file:
      - .env.prod
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host($${AUTH_HOST})"
      - "traefik.http.services.auth.loadbalancer.server.port=8083"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"
    restart: always
    networks:
      - traefik

  client:
    image: ghcr.io/yuyangc-gh/team-deployaas/client:latest
    container_name: studyapp_client
    env_file:
      - .env.prod
    depends_on:
      - auth-service
      - quiz-service
      - flashcard-service
    environment:
      - PUBLIC_API_URL=https://$${AUTH_HOST}
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host($${CLIENT_HOST})"
      - "traefik.http.services.client.loadbalancer.server.port=3000"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.client-compress.compress=true"
      - "traefik.http.routers.client.middlewares=client-compress"
    restart: always
    networks:
      - traefik

volumes:
  pgdata:

networks:
  traefik:
