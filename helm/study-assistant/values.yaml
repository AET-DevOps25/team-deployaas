tumid: dev

# LOCAL DEVELOPMENT VALUES - DO NOT USE IN PRODUCTION

# Secrets configuration
secrets:
  postgresPassword: "changeme123"
  jwtSecret: "my-secret-key-for-jwt-tokens-which-should-be-longer-and-more-secure"
  genaiApiKey: "sk-de1b5dfd9ef14dc798d1d121a2128512"
  grafanaPassword: "admin"

namespace:
  create: false

client:
  image:
    repository: ghcr.io/aet-devops25/team-deployaas/client
    tag: latest
    pullPolicy: Always
  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30080
  replicaCount: 1

quizService:
  image:
    repository: ghcr.io/aet-devops25/team-deployaas/quiz-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8081
    targetPort: 8081
  replicaCount: 1
  env:
    - name: SPRING_DATASOURCE_URL
      value: jdbc:postgresql://study-assistant-postgresql:5432/initexample
    - name: SPRING_DATASOURCE_USERNAME
      value: postgres
    - name: SPRING_DATASOURCE_PASSWORD
      value: changeme123
    - name: GENAI_SERVICE_URL
      value: http://study-assistant-genai-service:5001
    - name: SPRING_JPA_HIBERNATE_DDL_AUTO
      value: update
    - name: SPRING_JPA_SHOW_SQL
      value: "false"
    - name: FRONTEND_ORIGIN
      value: https://team-deployaas.student.k8s.aet.cit.tum.de
    - name: JWT_SECRET
      value: "my-secret-key-for-jwt-tokens-which-should-be-longer-and-more-secure"

flashcardService:
