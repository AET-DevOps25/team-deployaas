{{- if .Values.services.authService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "study-assistant.fullname" . }}-auth-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "study-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  replicas: {{ .Values.services.authService.replicas }}
  selector:
    matchLabels:
      {{- include "study-assistant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth-service
  template:
    metadata:
      labels:
        {{- include "study-assistant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth-service
    spec:
      automountServiceAccountToken: {{ not .Values.security.automountServiceAccountToken }}
      {{- if .Values.security.runAsNonRoot }}
      securityContext:
        runAsNonRoot: {{ .Values.security.runAsNonRoot }}
        runAsUser: {{ .Values.security.runAsUser }}
        fsGroup: {{ .Values.security.fsGroup }}
      {{- end }}
      containers:
      - name: auth-service
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/{{ .Values.services.authService.image }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.services.authService.port }}
        env:
        # Direct environment variables without ConfigMap/Secret dependencies
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://{{ include "study-assistant.fullname" . }}-postgresql:5432/{{ .Values.database.name }}"
        - name: SPRING_DATASOURCE_USERNAME
          value: {{ .Values.secrets.DATABASE_USERNAME | quote }}
        - name: SPRING_DATASOURCE_PASSWORD
          value: {{ .Values.secrets.DATABASE_PASSWORD | quote }}
        - name: SPRING_PROFILES_ACTIVE
          value: {{ .Values.config.SPRING_PROFILES_ACTIVE | quote }}
        - name: FRONTEND_ORIGIN
          value: {{ .Values.config.FRONTEND_ORIGIN | quote }}
        - name: JWT_SECRET
          value: {{ .Values.secrets.JWT_SECRET | quote }}
        resources:
          {{- toYaml .Values.services.authService.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/auth/test
            port: {{ .Values.services.authService.port }}
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/auth/test
            port: {{ .Values.services.authService.port }}
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "study-assistant.fullname" . }}-auth-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "study-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  selector:
    {{- include "study-assistant.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
  ports:
  - port: {{ .Values.services.authService.port }}
    targetPort: {{ .Values.services.authService.port }}
  type: ClusterIP
{{- end }}
