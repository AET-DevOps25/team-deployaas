# GenAI Service Secret - You need to create this manually before deployment
apiVersion: v1
kind: Secret
metadata:
  name: genai-secret
  namespace: {{ .Values.tumid }}
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  # Example: echo -n "your-actual-api-key" | base64
  WEBUI_API_KEY: eW91ci1hcGkta2V5LWhlcmU=  # your-api-key-here
