{{- if .Values.prometheus.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "study-assistant.fullname" . }}-prometheus-config
  labels:
    {{- include "study-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.config.global.scrape_interval | default "15s" }}
      evaluation_interval: 15s

    rule_files:
      - "prometheus.rules.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - {{ include "study-assistant.fullname" . }}-alertmanager:9093

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      {{- range .Values.prometheus.config.scrape_configs }}
      - job_name: {{ .job_name | quote }}
        {{- if .metrics_path }}
        metrics_path: {{ .metrics_path | quote }}
        {{- end }}
        static_configs:
          {{- range .static_configs }}
          - targets: {{ .targets | toYaml | nindent 12 }}
          {{- end }}
      {{- end }}

  prometheus.rules.yml: |
    groups:
      - name: study-assistant-alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Service {{`{{ $labels.instance }}`}} is down"
              description: "{{`{{ $labels.instance }}`}} of job {{`{{ $labels.job }}`}} has been down for more than 2 minutes."

          - alert: HighMemoryUsage
            expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{`{{ $labels.instance }}`}}"
              description: "Memory usage is above 80% for more than 5 minutes."
{{- end }}
