{{- if .Values.services.authService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "study-assistant.fullname" . }}-auth-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "study-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  replicas: {{ .Values.services.authService.replicas }}
  selector:
    matchLabels:
      {{- include "study-assistant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth-service
  template:
    metadata:
      labels:
        {{- include "study-assistant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth-service
    spec:
      automountServiceAccountToken: {{ not .Values.security.automountServiceAccountToken }}
      {{- if .Values.security.runAsNonRoot }}
      securityContext:
        runAsNonRoot: {{ .Values.security.runAsNonRoot }}
        runAsUser: {{ .Values.security.runAsUser }}
        fsGroup: {{ .Values.security.fsGroup }}
      {{- end }}
      containers:
      - name: auth-service
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/{{ .Values.services.authService.image }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.services.authService.port }}
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "study-assistant.fullname" . }}-config
              key: DATABASE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "study-assistant.fullname" . }}-secrets
              key: DATABASE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "study-assistant.fullname" . }}-secrets
              key: DATABASE_PASSWORD
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: {{ include "study-assistant.fullname" . }}-config
              key: SPRING_PROFILES_ACTIVE
        - name: FRONTEND_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: {{ include "study-assistant.fullname" . }}-config
              key: FRONTEND_ORIGIN
        resources:
          {{- toYaml .Values.services.authService.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/auth/test
            port: {{ .Values.services.authService.port }}
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/auth/test
            port: {{ .Values.services.authService.port }}
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "study-assistant.fullname" . }}-auth-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "study-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  selector:
    {{- include "study-assistant.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
  ports:
  - port: {{ .Values.services.authService.port }}
    targetPort: {{ .Values.services.authService.port }}
  type: ClusterIP
{{- end }}
