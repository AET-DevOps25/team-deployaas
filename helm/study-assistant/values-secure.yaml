# values-secrets.yaml - Template for secret values

tumid: dev

# Secrets from GitHub Actions
secrets:
  postgresPassword: ""  # Will be set from secrets.POSTGRES_PASSWORD
  jwtSecret: ""         # Will be set from secrets.JWT_SECRET  
  genaiApiKey: ""       # Will be set from secrets.GENAI_API_KEY
  grafanaPassword: ""   # Will be set from secrets.GRAFANA_PASSWORD

namespace:
  create: false

client:
  image:
    repository: ghcr.io/aet-devops25/team-deployaas/client
    tag: latest
    pullPolicy: Always
  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30080
  replicaCount: 1

quizService:
  image:
    repository: ghcr.io/aet-devops25/team-deployaas/quiz-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8081
    targetPort: 8081
  replicaCount: 1
  env:
    - name: SPRING_DATASOURCE_URL
      value: jdbc:postgresql://study-assistant-postgresql:5432/initexample
    - name: SPRING_DATASOURCE_USERNAME
      value: postgres
    - name: SPRING_DATASOURCE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: study-assistant-secrets
          key: postgres-password
    - name: GENAI_SERVICE_URL
      value: http://study-assistant-genai-service:5001
    - name: SPRING_JPA_HIBERNATE_DDL_AUTO
      value: update
    - name: SPRING_JPA_SHOW_SQL
      value: "false"
    - name: FRONTEND_ORIGIN
      value: https://team-deployaas.student.k8s.aet.cit.tum.de
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: study-assistant-secrets
          key: jwt-secret

flashcardService:
  image:
    repository: ghcr.io/aet-devops25/team-deployaas/flashcard-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8082
    targetPort: 8082
  replicaCount: 1
  env:
    - name: SPRING_DATASOURCE_URL
      value: jdbc:postgresql://study-assistant-postgresql:5432/initexample
    - name: SPRING_DATASOURCE_USERNAME
      value: postgres
    - name: SPRING_DATASOURCE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: study-assistant-secrets
          key: postgres-password
    - name: QUIZ_SERVICE_URL
      value: http://study-assistant-quiz-service:8081
    - name: SPRING_JPA_HIBERNATE_DDL_AUTO
      value: update
    - name: SPRING_JPA_SHOW_SQL
      value: "false"
    - name: FRONTEND_ORIGIN
      value: https://team-deployaas.student.k8s.aet.cit.tum.de
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: study-assistant-secrets
          key: jwt-secret

authService:
  image:
    repository: ghcr.io/aet-devops25/team-deployaas/auth-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8083
    targetPort: 8083
  replicaCount: 1
  env:
    - name: SPRING_DATASOURCE_URL
      value: jdbc:postgresql://study-assistant-postgresql:5432/initexample
    - name: SPRING_DATASOURCE_USERNAME
      value: postgres
    - name: SPRING_DATASOURCE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: study-assistant-secrets
          key: postgres-password
    - name: SPRING_JPA_HIBERNATE_DDL_AUTO
      value: update
    - name: SPRING_JPA_SHOW_SQL
      value: "false"
    - name: FRONTEND_ORIGIN
      value: https://team-deployaas.student.k8s.aet.cit.tum.de
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: study-assistant-secrets
          key: jwt-secret
    - name: FLASHCARD_SERVICE_URL
      value: http://study-assistant-flashcard-service:8082

genaiService:
  image:
    repository: ghcr.io/aet-devops25/team-deployaas/genai-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 5001
    targetPort: 5001
  replicaCount: 1
  env:
    - name: PORT
      value: "5001"
    - name: WEBUI_API_KEY
      valueFrom:
        secretKeyRef:
          name: study-assistant-secrets
          key: genai-api-key

# Rest of configuration remains the same...
prometheus:
  enabled: true
  image:
    repository: quay.io/prometheus/prometheus
    tag: v2.52.0
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090
  replicaCount: 1
  persistence:
    enabled: true
    size: 8Gi

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: 10.2.2
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  replicaCount: 1
  persistence:
    enabled: true
    size: 2Gi
  env:
    - name: GF_SECURITY_ADMIN_USER
      value: "admin"
    - name: GF_SECURITY_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: study-assistant-secrets
          key: grafana-password
    - name: GF_SERVER_ROOT_URL
      value: "https://team-deployaas.student.k8s.aet.cit.tum.de/grafana"
    - name: GF_SERVER_SERVE_FROM_SUB_PATH
      value: "true"

alertmanager:
  enabled: true
  image:
    repository: quay.io/prometheus/alertmanager
    tag: v0.27.0
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 9093
    targetPort: 9093
  replicaCount: 1
  persistence:
    enabled: true
    size: 1Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://team-deployaas.student.k8s.aet.cit.tum.de"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
  host: team-deployaas.student.k8s.aet.cit.tum.de
  tls: true
  tlsSecret: deployaas-tls

postgresql:
  enabled: true
  auth:
    enablePostgresUser: true
    existingSecret: study-assistant-secrets
    secretKeys:
      adminPasswordKey: postgres-password
    database: "initexample"
  primary:
    persistence:
      enabled: true
      size: 8Gi
