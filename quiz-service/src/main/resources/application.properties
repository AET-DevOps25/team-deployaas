spring.application.name=quiz-service
server.port=8081
frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}
jwt.secret=${JWT_SECRET}

# GenAI Service Configuration
genai.service.url=${GENAI_SERVICE_URL:http://genai-service:5001}

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/initexample
spring.datasource.username=initexample
spring.datasource.password=initexample
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Enable Prometheus endpoint
management.endpoints.web.exposure.include=health,info,prometheus

# Tag the application (use a unique name per service)
management.metrics.tags.application=quiz-service  

# Optional: Change actuator path if needed
management.endpoints.web.base-path=/actuator

