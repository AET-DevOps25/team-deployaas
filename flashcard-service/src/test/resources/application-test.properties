# Test profile configuration
spring.application.name=flashcard-service-test
server.port=8082

# JWT Configuration for tests
jwt.secret=testSecretKeyForJWTTokenGenerationThatIsLongEnoughForTesting123456789012345678901234567890

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable actual service calls in tests
quiz.service.url=http://mock-quiz-service:8081
