spring.application.name=flashcard-service
server.port=8082
frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}
jwt.secret=${JWT_SECRET}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/initexample}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Quiz Service Configuration
quiz.service.url=${QUIZ_SERVICE_URL:http://localhost:8081}

