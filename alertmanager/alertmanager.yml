global:
  # Optional: Define global Slack API URL if using Slack for notifications
 
route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'job', 'instance'] # Group alerts by their name, service, and specific instance
  group_wait: 30s # Wait 30 seconds for more alerts for the same group before sending initial notification
  group_interval: 5m # Wait 5 minutes between sending notifications for a continuing alert group
  repeat_interval: 4h # Resend all alerts in a group every 4 hours

receivers:
  - name: 'default-receiver'
    # This is where you configure your actual notification method.
    # For testing, you can just verify in Alertmanager UI (http://localhost:9093)