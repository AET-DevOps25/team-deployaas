spring.application.name=auth-service-test
server.port=0
frontend.origin=http://localhost:3000

# Test database configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Test JWT secret
jwt.secret=myTestSecretKeyForTestingPurposesOnly123456789

# Flashcard service configuration for tests
flashcard.service.url=http://flashcard-service:8082

# Disable actuator endpoints for tests
management.endpoints.web.exposure.include=health
management.endpoint.prometheus.enabled=false
management.metrics.export.prometheus.enabled=false

# Logging configuration for tests
logging.level.root=WARN
logging.level.com.aet.studyassistant.auth_service=INFO
