spring.application.name=auth-service
server.port=8083
frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

spring.datasource.url=jdbc:postgresql://localhost:5432/initexample
spring.datasource.username=initexample
spring.datasource.password=initexample

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=DEBUG
logging.level.org.springframework.security=DEBUG

jwt.secret=${JWT_SECRET}

# Flashcard service configuration
flashcard.service.url=http://flashcard-service:8082