spring.application.name=auth-service
server.port=8083
frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/initexample}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:initexample}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:initexample}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=DEBUG
logging.level.org.springframework.security=DEBUG

jwt.secret=${JWT_SECRET}

# Flashcard service configuration
flashcard.service.url=${FLASHCARD_SERVICE_URL:http://flashcard-service:8082}

# Enable Prometheus endpoint
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Tag the application (use a unique name per service)
management.metrics.tags.application=auth-service 

# Optional: Change actuator path if needed
management.endpoints.web.base-path=/actuator

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true

