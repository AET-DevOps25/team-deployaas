services:
  db:
    image: postgres:14
    container_name: studyapp_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4:6.21
    container_name: studyapp_pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@you.com
      PGADMIN_DEFAULT_PASSWORD: AdminPass123!
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./database/pgadmin4/servers.json:/pgadmin4/servers.json:ro

  quiz-service:
    build: ./quiz-service
    container_name: studyapp_quiz_service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - db
      - genai-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GENAI_SERVICE_URL=http://genai-service:5001

  flashcard-service:
    build: ./flashcard-service
    container_name: studyapp_flashcard_service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}

  auth-service:
    build: ./auth-service
    container_name: studyapp_auth_service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}

  genai-service:
    build: ./genai-service
    container_name: studyapp_genai_service
    restart: always
    ports:
      - "5001:5001"
    environment:
      - WEBUI_API_KEY=${WEBUI_API_KEY}
      - PORT=5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s

  client:
    build:
      context: ./frontend/client-vue
    container_name: studyapp_client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - quiz-service
      - flashcard-service
      - genai-service
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    ports:
      - "3001:3000"  
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning


volumes:
  pgdata:
  grafana-storage: 
    driver: local
