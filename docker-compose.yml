services:
  db:
    image: postgres:14
    container_name: studyapp_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4:6.21
    container_name: studyapp_pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@you.com
      PGADMIN_DEFAULT_PASSWORD: AdminPass123!
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./database/pgadmin4/servers.json:/pgadmin4/servers.json:ro

  quiz-service:
    build: ./quiz-service
    container_name: studyapp_quiz_service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  flashcard-service:
    build: ./flashcard-service
    container_name: studyapp_flashcard_service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  auth-service:
    build: ./auth-service
    container_name: studyapp_auth_service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/initexample
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  genai-service:
    build: ./genai
    container_name: studyapp_genai_service
    restart: always
    ports:
      - "8084:8084"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8084
      - LOG_LEVEL=INFO
    volumes:
      - genai_models:/app/models
    # Resource limits for local ML models
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s # Longer startup time for model loading

  client:
    build:
      context: ./frontend/client-vue
    container_name: studyapp_client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - quiz-service
      - flashcard-service
      - genai-service

volumes:
  pgdata:
  genai_models: